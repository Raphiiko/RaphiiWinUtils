# Add this to Home Assistant's configuration.yaml, or include it as a package.
# Keep the input_select options in sync with audioModes.modes in RaphiiWinUtils config.
input_select:
  raphii_audio_mode:
    name: Raphii PC audio mode
    options:
      - desk-mic
      - beyond
      - headset
      - iem
      - speaker
      - tws

input_text:
  raphii_audio_mode_current:
    name: Raphii PC current audio mode
    max: 64

input_boolean:
  raphiiwinutils_volumes_initialized:
    name: RaphiiWinUtils volumes initialized
    icon: mdi:volume-check

input_number:
  raphii_system_volume:
    name: Raphii PC system volume
    min: 0
    max: 100
    step: 1
    mode: slider
  raphii_browser_volume:
    name: Raphii PC browser volume
    min: 0
    max: 100
    step: 1
    mode: slider
  raphii_voice_volume:
    name: Raphii PC voice volume
    min: 0
    max: 100
    step: 1
    mode: slider
  raphii_music_volume:
    name: Raphii PC music volume
    min: 0
    max: 100
    step: 1
    mode: slider
  raphii_game_volume:
    name: Raphii PC game volume
    min: 0
    max: 100
    step: 1
    mode: slider
